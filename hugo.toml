baseURL = 'https://muzig.io'
languageCode = 'zh-cn'
title = 'Muzig'
theme = 'yinyang'
description = '面向开发者的 AI 工程深度博客，聚焦 Agent 工具链、MCP、Go 工程与编程语言设计。'
keywords = ['AI 工程', 'Agent', 'MCP', 'Go', '编程语言', 'LLM', 'OpenClaw', 'Claude Code']
timeZone = 'Asia/Shanghai'

# 启用 sitemap 和其他输出格式
[outputFormats]
[outputFormats.RSS]
mediatype = "application/rss+xml"
baseName = "index"

[outputs]
home = ["HTML", "RSS"]
section = ["HTML", "RSS"]

[taxonomies]
category = "categories"
tag = "tags"
series = "series"

# 配置 permalinks 以提高 URL 可读性
[permalinks]
posts = "/:year/:month/:day/:title/"

# 主题和站点参数
[params]
mainSections = ["posts"]
headTitle = "Muzig"
description = "面向开发者的 AI 工程深度博客，聚焦 Agent 工具链、MCP、Go 工程与编程语言设计。"
keywords = ["AI 工程", "Agent", "MCP", "Go", "编程语言", "LLM", "OpenClaw", "Claude Code"]
disqus = "muzig"         # disqus account name
twitterCards = true
googleAnalytics = "G-XXXXXXXXX"  # 替换为你的 Google Analytics ID
googleSiteVerification = "eGQlT6FCfJ6ocLk-156f5Fe6mF5-P5rPC9Oj0V5Rpkk"  # Google Search Console 验证
postFooterContent = "<br/><br/><p>订阅更新：<a target='_blank' href='https://mailchi.mp/a1a0d59e7a19/muzig'>Muzig 的技术博客</a></p>"
# extraHead = '<script async src="https://www.googletagmanager.com/gtag/js?id=UA-xxx"></script>'
[[params.socials]]
name = "GitHub"
link = "https://github.com/muzig"
# extraCSSFiles = ["css/foo.css", "css/bar.css"]

[params.author]
name = "Muzig"
homepage = "https://github.com/muzig"

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
[markup.highlight]
guessSyntax = true
noClasses = true
style = "bw"
tabWidth = 2

